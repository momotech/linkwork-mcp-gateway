apiVersion: v1
kind: Namespace
metadata:
  name: linkwork-mcp-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkwork-mcp-gateway
  namespace: linkwork-mcp-gateway
  labels:
    app: linkwork-mcp-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: linkwork-mcp-gateway
  template:
    metadata:
      labels:
        app: linkwork-mcp-gateway
    spec:
      dnsPolicy: ClusterFirst
      dnsConfig:
        searches:
          - example.internal
      imagePullSecrets:
        - name: image-registry-secret
      containers:
        - name: linkwork-mcp-gateway
          image: registry.example.com/linkwork/linkwork-mcp-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9080
          env:
            - name: WEB_SERVICE_BASE_URL
              value: "http://web-service.default.svc.cluster.local:8080"
            - name: REDIS_ADDR
              value: "redis.default.svc.cluster.local:6379"
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: linkwork-mcp-gateway
  namespace: linkwork-mcp-gateway
spec:
  type: ClusterIP
  selector:
    app: linkwork-mcp-gateway
  ports:
    - name: http
      port: 9080
      targetPort: 9080
---
apiVersion: v1
kind: Service
metadata:
  name: linkwork-mcp-gateway-nodeport
  namespace: linkwork-mcp-gateway
spec:
  type: NodePort
  selector:
    app: linkwork-mcp-gateway
  ports:
    - name: http
      port: 9080
      targetPort: 9080
      nodePort: 30890
